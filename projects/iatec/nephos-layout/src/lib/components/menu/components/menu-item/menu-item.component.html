<ng-container *ngIf="item.visible !== false">
  @if (root) {
    <div class="layout-menuitem-root-text">{{ item.label | transloco }}</div>
  }

  @if (!item.routerLink || item.items) {
    <a
      [attr.href]="item.url"
      [attr.target]="item.target"
      [ngClass]="item.class"
      [pTooltip]="item.label | transloco"
      [tooltipDisabled]="isTooltipDisabled()"
      pRipple
      tabindex="0"
      (click)="itemClick($event)"
      (mouseenter)="onMouseEnter()"
    >
      <i [ngClass]="item.icon" class="layout-menuitem-icon"></i>
      <span class="layout-menuitem-text">{{ item.label | transloco }}</span>
      @if (item.items) {
        <i class="pi pi-fw pi-angle-down layout-submenu-toggler"></i>
      }
    </a>
  } @else {
    <a
      [routerLink]="item.routerLink"
      routerLinkActive="active-route"
      [routerLinkActiveOptions]="
        item.routerLinkActiveOptions || {
          paths: 'exact',
          queryParams: 'ignored',
          matrixParams: 'ignored',
          fragment: 'ignored'
        }
      "
      [fragment]="item.fragment"
      [queryParamsHandling]="item.queryParamsHandling"
      [preserveFragment]="item.preserveFragment"
      [skipLocationChange]="item.skipLocationChange"
      [replaceUrl]="item.replaceUrl"
      [state]="item.state"
      [queryParams]="item.queryParams"
      [attr.target]="item.target"
      [ngClass]="item.class"
      [pTooltip]="item.label | transloco"
      [tooltipDisabled]="isTooltipDisabled()"
      pRipple
      tabindex="0"
      (click)="itemClick($event)"
      (mouseenter)="onMouseEnter()"
    >
      <i [ngClass]="item.icon" class="layout-menuitem-icon"></i>
      <span class="layout-menuitem-text">{{ item.label | transloco }}</span>
      @if (item.items) {
        <i class="pi pi-fw pi-angle-down layout-submenu-toggler"></i>
      }
    </a>
  }

  @if (item.items) {
    <ul
      #submenu
      [class.layout-root-submenulist]="root"
    >
      @for (child of item.items; track child; let i = $index) {
        <li
          [class]="child['badgeClass']"
          [index]="i"
          [item]="child"
          [parentKey]="key"
          nph-layout-menu-item
        ></li>
      }
    </ul>
  }
</ng-container>
