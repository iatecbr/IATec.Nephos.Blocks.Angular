<aside (mouseenter)="onMouseEnter()"
       (mouseleave)="onMouseLeave()"
        class="layout-sidebar">
    <div class="sidebar-content">

        <div class="sidebar-header-group">
            <a [routerLink]="['/']"
               class="app-logo">
                <ng-content></ng-content>
            </a>

            <button
                    (click)="onMenuButtonClick()"
                    class="sidebar-menubutton p-link p-trigger"
                    type="button">
                <i class="pi pi-chevron-left"></i>
            </button>
        </div>

        <nph-layout-sidebar-user-profile/>

        <div #menuContainer
             class="sidebar-menu-group">
            <nph-layout-menu></nph-layout-menu>
        </div>

        <nph-layout-sidebar-solution-logo/>
        <nph-layout-sidebar-user-apps [apps]="apps"/>
    </div>
</aside>
