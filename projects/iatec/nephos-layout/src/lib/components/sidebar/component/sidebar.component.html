<aside (mouseenter)="onMouseEnter()"
       (mouseleave)="onMouseLeave()"
        class="layout-sidebar">
    <div class="sidebar-content">

        <div class="sidebar-header-group">
            <a [routerLink]="['/']"
               class="app-logo">
                <ng-content></ng-content>
            </a>
            <div class="user-avatar-container">

            <a [routerLink]="['/']" (click)="onProfileButtonClick()"
               class="user-avatar">
                @if (urlAvatar) {
                    <img
                            [src]="urlAvatar"
                            alt="Profile"/>
                } @else {
                    <div>{{ letters }}</div>
                }
            </a>

                @if (isDesktopView()) {
                    <div class="user-avatar-profile">
                        <p>
                            Product Designer
                        </p>

                        <p>
                            <b>{{ name }}</b>
                        </p>
                    </div>
                }


            </div>
        </div>

        <!-- Menu -->
        <div #menuContainer
             class="sidebar-menu-group">
            <nph-layout-menu></nph-layout-menu>
        </div>

        <!-- Botão de Ação -->
        <nph-layout-sidebar-user-apps [apps]="apps"/>
    </div>
</aside>
