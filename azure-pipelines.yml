# Node.js with Angular
# Build a Node.js project that uses Angular.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  branches:
    include:
      - Versions/3*

pool:
  name: IATec-Builds-Agents-Linux

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '22.x'


  - task: Bash@3
    displayName: Install
    inputs:
      targetType: 'inline'
      script: |
        if [ -f "$(Build.SourcesDirectory)/package-lock.json" ]; then
          npm ci --legacy-peer-deps
        else
          npm install --legacy-peer-deps
        fi
      workingDirectory: '$(Build.SourcesDirectory)'

  - task: Npm@1
    displayName: Test (coverage)
    inputs:
      command: 'custom'
      workingDir: '$(Build.SourcesDirectory)'
      customCommand: 'run test -- --watch=false --code-coverage --browsers=ChromeHeadlessCI'

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFiles: '$(Build.SourcesDirectory)/**/TESTS-*.xml'

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish code coverage results'
    condition: succeededOrFailed()
    inputs:
      codeCoverageTool: Cobertura
      summaryFileLocation: '$(Build.SourcesDirectory)/coverage/cobertura-coverage.xml'
      reportDirectory: '$(Build.SourcesDirectory)/coverage'

  - task: Npm@1
    displayName: Build
    inputs:
      command: 'custom'
      workingDir: '$(Build.SourcesDirectory)'
      customCommand: 'run build'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'dist/stage'
      ArtifactName: 'files'
      publishLocation: 'Container'
