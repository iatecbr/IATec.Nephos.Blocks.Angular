# Node.js with Angular
# Build a Node.js project that uses Angular.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  branches:
    include:
      - Versions/3*

pool:
  name: IATec-Builds-Agents-Linux

steps:
  - task: NodeTool@0
    displayName: 'Install Node.js'
    inputs:
      versionSpec: '22.x'

  - task: Cache@2
    displayName: 'Cache node_modules'
    inputs:
      key: 'npm | "$(Agent.OS)" | $(Build.SourcesDirectory)/package.json | $(Build.SourcesDirectory)/package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: '$(Build.SourcesDirectory)/node_modules'
      cacheHitVar: 'NPM_CACHE_RESTORED'

  - task: Npm@1
    displayName: Install
    condition: ne(variables.NPM_CACHE_RESTORED, 'true')
    inputs:
      command: 'custom'
      workingDir: '$(Build.SourcesDirectory)'
      customCommand: 'ci --legacy-peer-deps'

  - task: Npm@1
    displayName: Test (coverage)
    inputs:
      command: 'custom'
      workingDir: '$(Build.SourcesDirectory)'
      customCommand: 'run test -- --watch=false --code-coverage --browsers=ChromeHeadless'

  - task: PublishCodeCoverageResults@1
    displayName: Publish code coverage
    inputs:
      codeCoverageTool: 'Cobertura'
      summaryFileLocation: '$(Build.SourcesDirectory)/coverage/cobertura-coverage.xml'
      reportDirectory: '$(Build.SourcesDirectory)/coverage'
      failIfCoverageEmpty: false

  - task: Npm@1
    displayName: Build
    inputs:
      command: 'custom'
      workingDir: '$(Build.SourcesDirectory)'
      customCommand: 'run build'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'dist/stage'
      ArtifactName: 'files'
      publishLocation: 'Container'
